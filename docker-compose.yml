version: '3.8'

services:
  # 1. Base de datos PostgreSQL
  db_container:
    image: postgres:15-alpine
    container_name: db_container
    restart: always
    environment:
      POSTGRES_USER: vzeta_user
      POSTGRES_PASSWORD: vzeta_password_secure2026
      POSTGRES_DB: vzeta_db
    volumes:
      - vzeta_db_data:/var/lib/postgresql/data
    networks:
      - vzeta_network

  # 2. Aplicación Python/Flask (Imagen Propia)
  myapp_container:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myapp_container
    restart: always
    environment:
      DB_HOST: db_container
      DB_USER: vzeta_user
      DB_PASSWORD: vzeta_password_secure2026
      DB_NAME: vzeta_db
    depends_on:
      - db_container
    networks:
      - vzeta_network

  # 3. NGINX Reverse Proxy
  mynginx_container:
    image: nginx:alpine
    container_name: mynginx_container
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - myapp_container
    networks:
      - vzeta_network

volumes:
  vzeta_db_data: # Driver de almacenamiento para la persistencia del contador

networks:
  vzeta_network:
    driver: bridge # Driver de red tradicional aislado
